baseURL = '/'
locale = 'ru-ru'
title = 'VkLiveService'

theme = "hextra"

canonifyURLs = true

pygmentsUseClasses = true
pygmentsCodeFences = true
disablePathToLower = true

[markup]
  [markup.goldmark.renderer]
    unsafe = true
  [markup.tableOfContents]
    startLevel = 1
    endLevel = 9

[params]
  [params.search]
    enable = true

  [params.theme]
    default = "system"
    displayToggle = true

  [params.toc]
    enable = true

  [params.navbar]
    [params.navbar.logo]
      path = "images/logo.png"

[menu]
  [[menu.main]]
    name = "Search"
    weight = 1
    [menu.main.params]
      type = "search"