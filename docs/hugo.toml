baseURL = '/'
locale = 'ru-ru'
title = 'VkLiveService'

theme = "hextra"

# Важно для публикации в подпапку (например /test-docs/ на docs.nuboheimer.ru):
# заставляет Hugo учитывать путь из baseURL при генерации ссылок на ассеты.
canonifyURLs = true

# Рекомендуемые базовые настройки для тем документации
pygmentsUseClasses = true
pygmentsCodeFences = true
disablePathToLower = true

[markup]
  [markup.goldmark.renderer]
    unsafe = true
  [markup.tableOfContents]
    startLevel = 1
    endLevel = 9

[params]
  [params.theme]
    # light | dark | system
    default = "system"
    displayToggle = true

  [params.toc]
    enable = true