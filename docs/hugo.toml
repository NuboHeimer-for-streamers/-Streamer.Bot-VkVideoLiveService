baseURL = '/'
locale = 'ru-ru'
title = 'VkLiveService'

theme = "hextra"

canonifyURLs = true

pygmentsUseClasses = true
pygmentsCodeFences = true
disablePathToLower = true

[markup]
  [markup.goldmark.renderer]
    unsafe = true
  [markup.tableOfContents]
    startLevel = 1
    endLevel = 9

[params]
  [params.search]
    enable = true

  [params.theme]
    default = "system"
    displayToggle = true

  [params.toc]
    enable = true

  [params.navbar]
    [params.navbar.logo]
      path = "images/logo.png"

[menu]
  [[menu.main]]
    name = "Search"
    weight = 1
    [menu.main.params]
      type = "search"

  [[menu.main]]
    name = "GitHub"
    url = "https://github.com/NuboHeimer-for-streamers/-Streamer.Bot-VkVideoLiveService"
    weight = 2
    [menu.main.params]
      icon = "github"

  [[menu.main]]
    name = "Telegram"
    url = "https://t.me/nuboheimersb/29"
    weight = 3
    [menu.main.params]
      icon = "telegram"

  [[menu.main]]
    name = "VK"
    url = "https://vk.com/nuboguides"
    weight = 4
    [menu.main.params]
      icon = "link"