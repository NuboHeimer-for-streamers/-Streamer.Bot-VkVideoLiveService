name: Docs (Hugo)

on:
  push:
    branches: [ testDocs ]
  workflow_dispatch:

env:
  PROJECT_SLUG: vkliveservice
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

concurrency:
  group: docs-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: "latest"
          extended: true

      - name: Prepare README for docs build
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          import os
          
          text = Path("README.md").read_text(encoding="utf-8")
          text = text.replace("(docs/content/INSTALLATION.md)", "(installation/)")
          text = text.replace("(docs/content/USAGE.md)", "(usage/)")

          repo = os.environ.get("GITHUB_REPOSITORY")
          ref = os.environ.get("GITHUB_REF_NAME")
          if repo and ref:
            changelog_url = f"https://github.com/{repo}/blob/{ref}/CHANGELOG.md"
            text = text.replace("(CHANGELOG.md)", f"({changelog_url})")

          Path("docs/README.project.md").write_text(text, encoding="utf-8")
          PY

      - name: Build (from /docs)
        shell: bash
        run: |
          slug="${PROJECT_SLUG}"
          hugo --source docs --minify \
            --baseURL "https://nuboheimer.ru/dev-docs/${slug}/" \
            --destination "../_site"

      # ── GitHub Pages ───────────────────────────────────────────
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: ./_site
          destination_dir: ${{ env.PROJECT_SLUG }}
          cname: docs.nuboheimer.ru

      # ── VPS → dev-docs ─────────────────────────────────────────
      - name: Deploy to VPS
        uses: easingthemes/ssh-deploy@v5
        with:
          SSH_PRIVATE_KEY: ${{ secrets.VPS_SSH_KEY }}
          ARGS: "-rlgoDzvc --delete"
          SOURCE: "./_site/"
          REMOTE_HOST: ${{ secrets.VPS_HOST }}
          REMOTE_USER: ${{ secrets.VPS_USER }}
          REMOTE_PORT: ${{ secrets.VPS_PORT }}
          TARGET: "/var/www/nubosite/dev-docs-data/${{ env.PROJECT_SLUG }}/"