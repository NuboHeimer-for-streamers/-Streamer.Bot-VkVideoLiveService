name: Docs (Hugo) -> GitHub Pages (test)

on:
  push:
    branches: [ testDocs ]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: docs-pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: "latest"
          extended: true

      - name: Compute site path
        id: site
        shell: bash
        run: |
          branch="${GITHUB_REF_NAME}"
          if [ "$branch" = "testDocs" ]; then echo "path=test-docs" >> "$GITHUB_OUTPUT"; exit 0; fi
          echo "path=${branch}" >> "$GITHUB_OUTPUT"

      - name: Build (from /docs)
        shell: bash
        run: |
          SITE_PATH="${{ steps.site.outputs.path }}"
          BASE_URL="https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/${SITE_PATH}/"
          hugo --source docs --minify --baseURL "$BASE_URL" --destination "../_site/${SITE_PATH}"

      - name: Deploy to gh-pages (subdir)
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: ./_site/${{ steps.site.outputs.path }}
          destination_dir: ${{ steps.site.outputs.path }}