name: Docs (Hugo) -> GitHub Pages (test)

on:
  push:
    branches: [ testDocs ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

concurrency:
  group: docs-pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: "latest"
          extended: true

      - name: Compute site path
        id: site
        shell: bash
        run: |
          branch="${GITHUB_REF_NAME}"
          if [ "$branch" = "testDocs" ]; then echo "path=test-docs" >> "$GITHUB_OUTPUT"; exit 0; fi
          echo "path=${branch}" >> "$GITHUB_OUTPUT"

      - name: Prepare README for docs build
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          import os
          
          text = Path("README.md").read_text(encoding="utf-8")
          # GitHub-friendly links -> site routes (Hugo pages)
          # Важно: ссылки делаем относительными, чтобы они работали в подпапке ветки:
          # https://docs.nuboheimer.ru/<branch>/
          text = text.replace("(docs/content/docs/INSTALLATION.md)", "(installation/)")
          text = text.replace("(docs/content/docs/USAGE.md)", "(usage/)")

          # CHANGELOG оставляем на GitHub (в текущей ветке)
          repo = os.environ.get("GITHUB_REPOSITORY")
          ref = os.environ.get("GITHUB_REF_NAME")
          if repo and ref:
            changelog_url = f"https://github.com/{repo}/blob/{ref}/CHANGELOG.md"
            text = text.replace("(CHANGELOG.md)", f"({changelog_url})")

          Path("docs/README.project.md").write_text(text, encoding="utf-8")
          PY

      - name: Build (from /docs)
        shell: bash
        run: |
          SITE_PATH="${{ steps.site.outputs.path }}"
          BASE_URL="https://docs.nuboheimer.ru/${SITE_PATH}/"
          hugo --source docs --minify --baseURL "$BASE_URL" --destination "../_site/${SITE_PATH}"

      - name: Deploy to gh-pages (subdir)
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: ./_site/${{ steps.site.outputs.path }}
          destination_dir: ${{ steps.site.outputs.path }}
          cname: docs.nuboheimer.ru